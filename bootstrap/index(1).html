<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <!-- container / container-fluid -->

      <h1 class="text-center">Belajar Bootstrap</h1>
      <!-- navigation bar -->
        <ul class="nav justify-content-center">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Active</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Link</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Link</a>
          </li>
          <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true">Disabled</a>
          </li>
        </ul>
      <!-- carousel -->
      <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="images/image.png" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="images/images.jpg" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="images/images-1.jpg" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="images/meshmew.jpg" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="images/GwlTR6WaYAAIfvz.jpg" class="d-block w-100" alt="..." />
          </div>
        </div>


        
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <!-- row 1 -->
      <div class="row mt-4">
        <div class="col">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
        <div class="col">
          <img src="images/image.png" alt="" class="img-fluid rounded" />
        </div>
        <div class="col">
          <img src="images/image.png" alt="" class="img-fluid rounded-circle" />
        </div>
      </div>

      <!-- row 2 -->
      <div class="row mt-4 g-3">
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
      </div>

      <!-- row 3 -->
      <div class="row mt-4 g-3">
        <div class="col-lg-6 col-md-12">
          <img src="images/image.png" alt="" class="img-fluid" width="91.5%" />
        </div>
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
        <div class="col-lg-3 col-md-6">
          <img src="images/image.png" alt="" class="img-fluid" />
        </div>
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
